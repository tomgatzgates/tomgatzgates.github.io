<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f6f5f1;
            --surface: #ffffff;
            --border: #e4e1d9;
            --text: #1c1c1c;
            --muted: #6b6560;
            --weekday: #ffffff;
            --weekend: #ede9e1;
            --today-bg: #fef3c7;
            --today-text: #92400e;
            --accent: #4a6cf7;
            --accent-hover: #3558e8;
            --danger: #e53e3e;
            --radius: 6px;
        }

        @page {
            size: letter landscape;
            margin: 0.5in;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ── */
        .page-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .page-header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .year-select-wrap {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .year-select-wrap label {
            font-size: 0.8rem;
            color: var(--muted);
        }

        #yearSelect {
            font-family: inherit;
            font-size: 0.85rem;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.3rem 0.5rem;
            cursor: pointer;
            outline: none;
        }

        #yearSelect:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74,108,247,0.12);
        }

        /* ── Layout ── */
        .page-body {
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: row;
            gap: 1.5rem;
        }

        .calendar-container { flex: 3; }

        .events-container {
            flex: 1;
            min-width: 240px;
        }

        /* ── Calendar table ── */
        .calendar {
            width: 100%;
            font-size: 0.72rem;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .calendar th {
            padding: 0.4rem 0.25rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--muted);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }

        .calendar td {
            width: 7.2%;
            height: 1.6rem;
            padding: 0 0.2rem;
            border: 1px solid var(--border);
            position: relative;
            background: var(--weekday);
            color: var(--text);
            font-size: 0.7rem;
        }

        .calendar td:first-of-type {
            width: 3%;
            text-align: center;
            font-weight: 600;
            color: var(--muted);
            background: var(--bg);
            border-right: 2px solid var(--border);
            font-size: 0.68rem;
        }

        .calendar td.weekend {
            background: var(--weekend);
            color: var(--muted);
        }

        .calendar td.weekday {
            background: var(--weekday);
        }

        .current-day {
            background: var(--today-bg) !important;
            color: var(--today-text) !important;
            font-weight: 700;
        }

        .event-markers {
            position: absolute;
            bottom: 2px;
            right: 2px;
            display: flex;
            flex-direction: row;
            gap: 2px;
        }

        .event-marker {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        /* ── Events sidebar ── */
        .events-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .events-header h2 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
        }

        .add-event-btn {
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 500;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            padding: 0.35rem 0.75rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .add-event-btn:hover { background: var(--accent-hover); }

        .events-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: calc(100vh - 160px);
            overflow-y: auto;
            padding-right: 2px;
        }

        .events-list p {
            font-size: 0.8rem;
            color: var(--muted);
            text-align: center;
            padding: 1.5rem 0;
        }

        .event-item {
            border-radius: var(--radius);
            padding: 0.6rem 0.75rem;
            position: relative;
            cursor: pointer;
            transition: filter 0.1s;
        }

        .event-item:hover { filter: brightness(0.96); }

        .event-item .event-title {
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            padding-right: 1.2rem;
        }

        .event-item .event-date {
            font-size: 0.72rem;
            color: var(--muted);
        }

        .event-duration {
            font-size: 0.72rem;
            color: var(--muted);
            font-weight: 400;
        }

        .event-item .event-notes {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 0.2rem;
        }

        .event-item .delete-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1;
            padding: 0.1rem;
            border-radius: 3px;
            transition: color 0.1s, background 0.1s;
        }

        .delete-btn:hover {
            color: var(--danger);
            background: rgba(229,62,62,0.08);
        }

        /* ── Dialog ── */
        .event-dialog {
            font-family: inherit;
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            background: var(--surface);
        }

        .event-dialog::backdrop {
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(2px);
        }

        .dialog-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: var(--text);
        }

        .dialog-form {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .form-group label {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--muted);
        }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group textarea {
            font-family: inherit;
            font-size: 0.85rem;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.45rem 0.6rem;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(74,108,247,0.12);
        }

        .form-group input[type="color"] {
            height: 2.2rem;
            padding: 0.2rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            cursor: pointer;
            width: 100%;
        }

        .dialog-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }

        .btn-cancel {
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--muted);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.4rem 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-cancel:hover { background: var(--border); }

        .btn-save {
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            padding: 0.4rem 0.9rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-save:hover { background: var(--accent-hover); }

        /* ── Print ── */
        @media print {
            body { background: #fff; }
            .page-header { display: none; }
            .page-body { padding: 0; }
            .events-container { display: none; }
            .calendar {
                width: 100% !important;
                border-collapse: collapse;
                font-size: 0.65rem;
                border: none;
                border-radius: 0;
            }
            .weekend {
                background-color: #e0e0e0 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .current-day {
                background-color: transparent !important;
                color: inherit !important;
                font-weight: normal;
            }
            .event-marker {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .print-events-page {
                display: block !important;
                page-break-before: always;
                font-family: inherit;
            }
            .print-events-title {
                text-align: center;
                font-size: 18px;
                margin-bottom: 15px;
                font-weight: 600;
            }
            .print-event-item {
                margin-bottom: 10px;
                padding: 8px;
                border-radius: 4px;
                border-left-width: 4px;
                border-left-style: solid;
                background-color: rgba(240,240,240,0.5) !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .print-event-legend {
                margin-top: 20px;
                border-top: 1px solid #ccc;
                padding-top: 10px;
            }
            .legend-item {
                display: flex;
                align-items: center;
                margin-bottom: 5px;
            }
            .legend-marker {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                margin-right: 10px;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        .print-events-page { display: none; }
    </style>
</head>
<body>
    <header class="page-header">
        <h1 id="calendarTitle">Calendar</h1>
        <div class="year-select-wrap">
            <label for="yearSelect">Year</label>
            <select id="yearSelect"></select>
        </div>
    </header>

    <div class="page-body">
        <div class="calendar-container">
            <table class="calendar" id="calendar">
                <thead>
                    <tr id="monthHeaders"></tr>
                </thead>
                <tbody id="calendarBody"></tbody>
            </table>
        </div>
        <div class="events-container">
            <div class="events-header">
                <h2>Events</h2>
                <button class="add-event-btn" id="addEventBtn">+ Add</button>
            </div>
            <div class="events-list" id="eventsList"></div>
        </div>
    </div>
    
    <!-- This section will only be visible when printing -->
    <div class="print-events-page" id="printEventsPage">
        <div class="print-events-title" id="printEventsTitle">Events List</div>
        <div id="printEventsList"></div>
        
        <div class="print-event-legend">
            <h3>Color Legend</h3>
            <div id="printEventsLegend"></div>
        </div>
    </div>

    <dialog id="eventDialog" class="event-dialog">
        <div class="dialog-title">Add Event</div>
        <form id="eventForm" class="dialog-form">
            <div class="form-group">
                <label for="eventTitle">Title</label>
                <input type="text" id="eventTitle" required placeholder="Event name">
            </div>
            <div class="form-group">
                <label for="eventStartDate">Start date</label>
                <input type="date" id="eventStartDate" required>
            </div>
            <div class="form-group">
                <label for="eventEndDate">End date <span style="font-weight:400">(optional)</span></label>
                <input type="date" id="eventEndDate">
            </div>
            <div class="form-group">
                <label for="eventColor">Colour</label>
                <input type="color" id="eventColor" value="#4285f4">
            </div>
            <div class="form-group">
                <label for="eventNotes">Notes <span style="font-weight:400">(optional)</span></label>
                <textarea id="eventNotes" rows="3" placeholder="Any extra details…"></textarea>
            </div>
            <input type="hidden" id="eventId">
            <div class="dialog-buttons">
                <button type="button" id="cancelBtn" class="btn-cancel">Cancel</button>
                <button type="submit" class="btn-save">Save</button>
            </div>
        </form>
    </dialog>

    <script>
        // Event storage
        let events = [];
        const storageKey = 'calendarEvents';

        // Check for localStorage support
        const hasLocalStorage = (function() {
            try {
                localStorage.setItem('test', 'test');
                localStorage.removeItem('test');
                return true;
            } catch(e) {
                return false;
            }
        })();

        function loadEvents() {
            if (hasLocalStorage) {
                const storedEvents = localStorage.getItem(storageKey);
                if (storedEvents) {
                    events = JSON.parse(storedEvents);
                }
            }
        }

        function saveEvents() {
            if (hasLocalStorage) {
                localStorage.setItem(storageKey, JSON.stringify(events));
            }
        }

        function populateYearDropdown() {
            const select = document.getElementById('yearSelect');
            for (let year = 1900; year <= 2100; year++) {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                select.appendChild(option);
            }
            select.value = new Date().getFullYear();
        }

        function generateCalendar(year) {
            const months = [
                'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'
            ];
            // Account for leap years
            const isLeapYear = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
            const daysInMonth = [31, isLeapYear ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
            
            // Update title
            const titleText = `${year} Calendar`;
            document.title = titleText; // Set document title
            document.getElementById('calendarTitle').textContent = titleText;
            document.getElementById('printEventsTitle').textContent = `${year} Events List`;

            // Get current date to highlight current day
            const today = new Date();
            const currentDay = today.getDate();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();

            // Calculate first day of each month
            const firstDayOfMonth = [];
            let currentDate = new Date(year, 0, 1);
            for (let i = 0; i < 12; i++) {
                firstDayOfMonth.push(currentDate.getDay());
                currentDate.setMonth(currentDate.getMonth() + 1);
            }

            // Generate month headers
            const headerRow = document.getElementById('monthHeaders');
            headerRow.innerHTML = `<th>${year}</th>`;
            months.forEach(month => {
                headerRow.innerHTML += `<th>${month}</th>`;
            });

            // Generate calendar body
            const tbody = document.getElementById('calendarBody');
            tbody.innerHTML = ''; // Clear previous content
            let dayCounter = Array(12).fill(0);

            for (let day = 1; day <= 31; day++) {
                let row = `<tr><td>${day}</td>`;
                
                for (let month = 0; month < 12; month++) {
                    let cellContent = '';
                    let classes = [];
                    let eventMarkersHtml = '';

                    if (day <= daysInMonth[month]) {
                        const date = new Date(year, month, day);
                        const dayOfWeek = date.getDay();
                        dayCounter[month]++;
                        cellContent = date.toLocaleString('en-US', { weekday: 'short' });
                        cellContent = cellContent.substring(0,cellContent.length - 1);
                        
                        // Add weekend class if applicable
                        if (dayOfWeek === 0 || dayOfWeek === 6) {
                            classes.push('weekend');
                        }else{
                            classes.push('weekday');
                        }
                        
                        // Add current-day class if this cell is today
                        if (year === currentYear && month === currentMonth && day === currentDay) {
                            classes.push('current-day');
                        }

                        // Check for events on this day
                        const dateStr = formatDateString(date);
                        const eventsOnDay = getEventsForDate(dateStr);
                        
                        if (eventsOnDay.length > 0) {
                            // Create event markers container
                            eventMarkersHtml = '<div class="event-markers">';
                            
                            // Add up to 3 event markers (to avoid overcrowding)
                            const maxMarkers = Math.min(eventsOnDay.length, 3);
                            for (let i = 0; i < maxMarkers; i++) {
                                const eventColor = eventsOnDay[i].color || '#4285f4';
                                eventMarkersHtml += `<div class="event-marker" style="background-color: ${eventColor};" 
                                    title="${eventsOnDay[i].title}"></div>`;
                            }
                            
                            // If there are more events than we're showing markers for
                            if (eventsOnDay.length > maxMarkers) {
                                eventMarkersHtml += `<div class="event-marker" style="background-color: #999;" 
                                    title="${eventsOnDay.length - maxMarkers} more event(s)"></div>`;
                            }
                            
                            eventMarkersHtml += '</div>';
                            
                            // Add data attribute for date to enable click handling
                            cellContent = `<span data-date="${dateStr}">${cellContent}</span>`;
                        }
                    }

                    row += `<td class="${classes.join(' ')}">${cellContent}${eventMarkersHtml}</td>`;
                }
                row += '</tr>';
                tbody.innerHTML += row;
            }

            // Add event listeners to cells with events
            document.querySelectorAll('[data-date]').forEach(element => {
                element.style.cursor = 'pointer';
                element.addEventListener('click', function() {
                    const dateStr = this.getAttribute('data-date');
                    showEventsForDate(dateStr);
                });
            });
            
            // Update the print events list
            updatePrintEventsList();
        }

        // Calculate number of days between two dates
        function getDaysBetween(startDate, endDate) {
            if (!startDate || !endDate) return 1;
            
            const start = new Date(startDate);
            const end = new Date(endDate);
            
            // Reset time part to ensure we're counting full days
            start.setHours(0, 0, 0, 0);
            end.setHours(0, 0, 0, 0);
            
            // Calculate difference in milliseconds and convert to days
            const diffTime = Math.abs(end - start);
            return Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1; // +1 to include both start and end days
        }

        function formatDateString(date) {
            return date.toISOString().split('T')[0]; // Format as YYYY-MM-DD
        }

        function getEventsForDate(dateStr) {
            return events.filter(event => {
                // Check if date is between start and end dates (inclusive)
                const eventDate = new Date(dateStr);
                const startDate = new Date(event.startDate);
                startDate.setHours(0, 0, 0, 0);
                
                if (event.endDate) {
                    const endDate = new Date(event.endDate);
                    endDate.setHours(23, 59, 59, 999);
                    return eventDate >= startDate && eventDate <= endDate;
                } else {
                    // If no end date, check if it matches start date
                    return dateStr === event.startDate;
                }
            });
        }

        function showEventsForDate(dateStr) {
            const eventsOnDay = getEventsForDate(dateStr);
            if (eventsOnDay.length > 0) {
                // Highlight these events in the events list
                renderEventsList();
                
                // Scroll to the first event
                const firstEventEl = document.querySelector(`[data-event-id="${eventsOnDay[0].id}"]`);
                if (firstEventEl) {
                    firstEventEl.scrollIntoView({ behavior: 'smooth' });
                    firstEventEl.style.boxShadow = '0 0 8px rgba(66, 133, 244, 0.8)';
                    setTimeout(() => {
                        firstEventEl.style.boxShadow = 'none';
                    }, 2000);
                }
            }
        }

        function renderEventsList() {
            const eventsList = document.getElementById('eventsList');
            eventsList.innerHTML = '';
            
            // Sort events by start date
            const sortedEvents = [...events].sort((a, b) => {
                return new Date(a.startDate) - new Date(b.startDate);
            });
            
            if (sortedEvents.length === 0) {
                eventsList.innerHTML = '<p>No events added yet.</p>';
                return;
            }
            
            sortedEvents.forEach(event => {
                const eventEl = document.createElement('div');
                eventEl.className = 'event-item';
                eventEl.dataset.eventId = event.id;
                eventEl.style.backgroundColor = `${event.color}20`; // Use color with transparency
                eventEl.style.borderLeft = `4px solid ${event.color}`;
                
                let dateDisplay = formatDisplayDate(event.startDate);
                if (event.endDate) {
                    dateDisplay += ` to ${formatDisplayDate(event.endDate)}`;
                }
                
                // Calculate event duration
                let durationHtml = '';
                if (event.endDate) {
                    const days = getDaysBetween(event.startDate, event.endDate);
                    if (days > 1) {
                        durationHtml = `<span class="event-duration">(${days} days)</span>`;
                    }
                }
                
                eventEl.innerHTML = `
                    <div class="event-title">${event.title} ${durationHtml}</div>
                    <div class="event-date">${dateDisplay}</div>
                    ${event.notes ? `<div class="event-notes">${event.notes}</div>` : ''}
                    <button class="delete-btn" data-event-id="${event.id}">&times;</button>
                `;
                
                // Add click event for editing
                eventEl.addEventListener('click', function(e) {
                    if (!e.target.matches('.delete-btn')) {
                        openEditEventDialog(event.id);
                    }
                });
                
                eventsList.appendChild(eventEl);
            });
            
            // Add delete button event listeners
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const eventId = this.getAttribute('data-event-id');
                    deleteEvent(eventId);
                });
            });
            
            // Update the print events list as well
            updatePrintEventsList();
        }
        
        function updatePrintEventsList() {
            const printEventsList = document.getElementById('printEventsList');
            const printEventsLegend = document.getElementById('printEventsLegend');
            
            printEventsList.innerHTML = '';
            printEventsLegend.innerHTML = '';
            
            // Sort events by start date
            const sortedEvents = [...events].sort((a, b) => {
                return new Date(a.startDate) - new Date(b.startDate);
            });
            
            if (sortedEvents.length === 0) {
                printEventsList.innerHTML = '<p>No events scheduled.</p>';
                return;
            }
            
            // Create a map to track unique colors for the legend
            const colorMap = new Map();
            
            sortedEvents.forEach(event => {
                const eventEl = document.createElement('div');
                eventEl.className = 'print-event-item';
                eventEl.style.borderLeftColor = event.color;
                eventEl.style.backgroundColor = `${event.color}10`; // Very light background
                
                let dateDisplay = formatDisplayDate(event.startDate);
                if (event.endDate) {
                    dateDisplay += ` to ${formatDisplayDate(event.endDate)}`;
                }
                
                // Calculate event duration for print view
                let durationHtml = '';
                if (event.endDate) {
                    const days = getDaysBetween(event.startDate, event.endDate);
                    if (days > 1) {
                        durationHtml = `<span class="event-duration">(${days} days)</span>`;
                    }
                }
                
                eventEl.innerHTML = `
                    <div class="event-title">${event.title} ${durationHtml}</div>
                    <div class="event-date">${dateDisplay}</div>
                    ${event.notes ? `<div class="event-notes">${event.notes}</div>` : ''}
                `;
                
                printEventsList.appendChild(eventEl);
                
                // Add to color map for legend (if not already there)
                if (!colorMap.has(event.color)) {
                    colorMap.set(event.color, event.title);
                }
            });
            
            // Create the color legend
            colorMap.forEach((title, color) => {
                const legendItem = document.createElement('div');
                legendItem.className = 'legend-item';
                legendItem.innerHTML = `
                    <div class="legend-marker" style="background-color: ${color};"></div>
                    <div>${color}</div>
                `;
                printEventsLegend.appendChild(legendItem);
            });
        }

        function formatDisplayDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        function setupEventDialog() {
            const dialog = document.getElementById('eventDialog');
            const form = document.getElementById('eventForm');
            const addBtn = document.getElementById('addEventBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            
            // Set default start date to today
            document.getElementById('eventStartDate').valueAsDate = new Date();
            
            // Open dialog when Add Event button is clicked
            addBtn.addEventListener('click', function() {
                // Clear form for new event
                form.reset();
                document.getElementById('eventId').value = '';
                document.getElementById('eventStartDate').valueAsDate = new Date();
                dialog.showModal();
            });
            
            // Close dialog when Cancel button is clicked
            cancelBtn.addEventListener('click', function() {
                dialog.close();
            });
            
            // Handle form submission
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const eventId = document.getElementById('eventId').value;
                const eventData = {
                    title: document.getElementById('eventTitle').value,
                    startDate: document.getElementById('eventStartDate').value,
                    endDate: document.getElementById('eventEndDate').value || null,
                    color: document.getElementById('eventColor').value,
                    notes: document.getElementById('eventNotes').value
                };
                
                if (eventId) {
                    // Update existing event
                    updateEvent(eventId, eventData);
                } else {
                    // Add new event
                    addEvent(eventData);
                }
                
                dialog.close();
            });
        }

        function openEditEventDialog(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;
            
            document.getElementById('eventId').value = event.id;
            document.getElementById('eventTitle').value = event.title;
            document.getElementById('eventStartDate').value = event.startDate;
            document.getElementById('eventEndDate').value = event.endDate || '';
            document.getElementById('eventColor').value = event.color;
            document.getElementById('eventNotes').value = event.notes || '';
            
            document.getElementById('eventDialog').showModal();
        }

        function addEvent(eventData) {
            const newEvent = {
                id: 'event_' + Date.now(),
                title: eventData.title,
                startDate: eventData.startDate,
                endDate: eventData.endDate,
                color: eventData.color,
                notes: eventData.notes
            };
            
            events.push(newEvent);
            saveEvents();
            renderEventsList();
            generateCalendar(parseInt(document.getElementById('yearSelect').value));
        }

        function updateEvent(eventId, eventData) {
            const index = events.findIndex(e => e.id === eventId);
            if (index !== -1) {
                events[index] = {
                    ...events[index],
                    title: eventData.title,
                    startDate: eventData.startDate,
                    endDate: eventData.endDate,
                    color: eventData.color,
                    notes: eventData.notes
                };
                
                saveEvents();
                renderEventsList();
                generateCalendar(parseInt(document.getElementById('yearSelect').value));
            }
        }

        function deleteEvent(eventId) {
            if (confirm('Are you sure you want to delete this event?')) {
                events = events.filter(e => e.id !== eventId);
                saveEvents();
                renderEventsList();
                generateCalendar(parseInt(document.getElementById('yearSelect').value));
            }
        }

        // Initialize page
        window.onload = function() {
            loadEvents();
            populateYearDropdown();
            const currentYear = new Date().getFullYear();
            generateCalendar(currentYear); // Default year
            
            // Add event listener for year selection
            document.getElementById('yearSelect').addEventListener('change', function(e) {
                generateCalendar(parseInt(e.target.value));
            });
            
            setupEventDialog();
            renderEventsList();
        }
    </script>
</body>
</html>
